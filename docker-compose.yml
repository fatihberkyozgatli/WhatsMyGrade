version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: whatsmygrade-db
    environment:
      POSTGRES_USER: whatsmygrade_user
      POSTGRES_PASSWORD: whatsmygrade_password
      POSTGRES_DB: whatsmygrade
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whatsmygrade_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: whatsmygrade-backend
    environment:
      DATABASE_URL: postgresql://whatsmygrade_user:whatsmygrade_password@postgres:5432/whatsmygrade
      JWT_SECRET: your-secret-key-change-this-in-production
      NODE_ENV: development
      PORT: 5001
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsmygrade-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5001/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
